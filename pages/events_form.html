<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.boxicons.com/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="events.css" />
    <title>Students-Hub registration form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <header></header>
    <section class="form-area"> 
      <div class="form-box">
        <form method="get" action="events.html">
          <a class="arrow-link" href="events.html"><i class='bxr  bx-x-circle'id="exit-sign" ></i></a>
          <h2>Event Registration</h2>

          <!-- input tags -->
          <div class="form-input-box">
            <!-- Full name -->
            <div>
              <label for="username" class="visually-hidden">Full Name</label>
              <input
                type="text"
                id="username"
                name="username"
                required
                placeholder="Full name"
                class="form-input-tags"
                maxlength="15"
                minlength="7"
              />
            </div>

            <!-- Email -->
            <div>
              <label for="email" class="visually-hidden">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="Email"
                class="form-input-tags"
              />
            </div>

            <!-- Phone -->
            <div>
              <label for="phone" class="visually-hidden">Phone Number</label>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Phone number"
                minlength="11"
                maxlength="11"
                required
                class="form-input-tags"
              />
            </div>

            <!-- Password -->
            <div>
              <label for="password" class="visually-hidden">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                required
                minlength="8"
                placeholder="Enter password"
                class="form-input-tags"
              />
            </div>
          </div>
          <button class="form-submit-button" type="submit">Submit now</button>
        </form>
      </div>
    </section>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js"
      integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
