<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Page</title>
    <!-- Google Fonts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/styles/nav_footer.css" />
  </head>
  <body>
    <!-------HEADER-------->
    <header>
      <div class="logo">StudentHub</div>

      <form class="search-form" action="#" method="get">
        <div class="search-wrapper">
          <img
            src="../images/search icon.png"
            alt="Search Icon"
            class="search-icon"
          />
          <input
            type="text"
            placeholder="Explore by Skill or Mentor..."
            name="q"
          />
        </div>
      </form>

      <nav>
        <a href="../index.html">Home</a>
        <a href="resources.html" class="active">Resources</a>
        <a href="./events.html">Events</a>
        <a href="./mentorship.html">Mentorship</a>
      </nav>

      <div class="auth-buttons">
        <button class="login-btn">Log in</button>
        <button class="signup-btn">Sign up</button>
      </div>
    </header>

    <style>
      /* -------GENERAL STYLES------- */
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background-color: white;
        color: #000;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      /* -------LAYOUT------- */
      .container {
        display: flex;
        max-width: 1200px;
        margin: 20px auto;
        gap: 20px;
        padding: 20px;
        background-color: #e0f2fe;
        border-radius: 10px;
      }

      .left,
      .right {
        flex: 1;
      }

      /* -------VIDEO SECTION------- */
      .video-card {
        background-color: #0e0f2c;
        border-radius: 12px;
        padding: 20px;
        position: relative;
        color: #fff;
        text-align: center;
      }

      .video-card h1 {
        font-size: 28px;
        margin: 0;
      }

      .video-card h1 span {
        background-color: #b3ff33;
        color: #000;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
      }

      .video-wrapper {
        margin-top: 20px;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 16 / 9;
      }

      .video-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* -------TABS AND DESCRIPTION------- */
      .tabs {
        margin-top: 15px;
        display: flex;
        gap: 20px;
        font-weight: bold;
        color: #0e7de0;
      }

      .description {
        margin-top: 10px;
        font-size: 16px;
        line-height: 1.6;
      }

      .course-info {
        margin-top: 15px;
        display: flex;
        gap: 30px;
        font-size: 14px;
        color: #444;
      }

      .course-info span {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .course-details {
        margin-top: 15px;
        display: flex;
        gap: 30px;
        font-size: 14px;
        color: #d946ef;
      }

      /* -------RIGHT SIDEBAR------- */
      .right {
        background-color: #f1f9ff;
        border-radius: 10px;
        padding: 15px;
      }

      .right h3 {
        margin-bottom: 15px;
        font-size: 18px;
      }

      .module {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
      }

      .module input {
        margin-right: 10px;
      }

      .module label {
        font-size: 14px;
        line-height: 1.4;
      }

      .duration {
        font-size: 13px;
        color: #666;
      }

      .questions {
        font-size: 12px;
        color: #555;
        margin-left: 25px;
      }

      html {
        scroll-behavior: smooth;
      }
    </style>

    <div class="container">
      <section id="masteringTM" class="left">
        <div class="video-card">
          <h1>
            <span>Introduction to</span><br />Language Immersion Techniques
          </h1>
          <div class="video-wrapper">
            <iframe
              width="640"
              height="360"
              src="https://www.youtube.com/embed/iONDebHX9qk"
              title="How I Manage My Time - 10 Time Management Tips"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
          </div>
        </div>

        <!-- <-------TABS + DESCRIPTION------->

        <div class="tabs">
          <span>Overview</span>
          <span>Q&A</span>
          <span>Notes</span>
          <span>Learning tools</span>
        </div>

        <div class="description">
          Learn powerful techniques to prioritize tasks, avoid procrastination, and manage your time like a pro.
        </div>

        <!-- <-------INFO------->

        <div class="course-info">
          <span>⭐ 4.3 </span>
          <span>👥15,200 </span>
          <span>⏱️10.5 hours </span>
        </div>
        <div class="course-details">
          <span>902 ratings</span>
          <span>Students</span>
          <span>Total</span>
        </div>
      </section>

      <!-- <-------RIGHT SIDEBAR: Course Content------->

      <div class="right">
        <h3>Course content</h3>

        <div class="module">
          <input type="checkbox" checked />
          <label>
            1.Language Immersion Techniques<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            2. Unity Essentials<br />
            <span class="duration">Duration: 2hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            3. 2D Game Creation<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            4. Unity 3D & Polish<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            5. Quiz<br />
            <span class="duration">6 Questions</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            6. Unreal Fundamentals<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            7. Character & Movement<br />
            <span class="duration">Duration: 1.5hrs</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            8. Level Design<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            9. Polish & Deploy<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>

        <div class="module">
          <input type="checkbox" />
          <label>
            10. Portfolio & CareerWrap-up<br />
            <span class="duration">Duration: 1hr</span>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
